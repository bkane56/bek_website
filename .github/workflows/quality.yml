name: Quality

on:
  push:
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.9.0
          cache: yarn
          cache-dependency-path: frontend/yarn.lock

      - name: Enable Corepack
        run: corepack enable

      - name: Runtime versions
        run: |
          node --version
          yarn --version

      - name: Install dependencies
        run: yarn --cwd frontend install --frozen-lockfile

      - name: Lint
        run: yarn --cwd frontend lint

      - name: Test
        run: yarn --cwd frontend test

      - name: Test coverage
        run: yarn --cwd frontend test:coverage
