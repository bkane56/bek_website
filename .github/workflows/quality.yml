name: Quality

on:
  push:
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: yarn
          cache-dependency-path: frontend/yarn.lock

      - name: Enable Corepack
        run: corepack enable

      - name: Runtime versions
        run: |
          node --version
          yarn --version

      - name: Install dependencies (retry on transient network failures)
        run: |
          for attempt in 1 2 3; do
            yarn --cwd frontend install --frozen-lockfile --network-timeout 600000 && exit 0
            echo "Install attempt ${attempt} failed."
            if [ "${attempt}" -lt 3 ]; then
              echo "Retrying in 5 seconds..."
              sleep 5
            fi
          done
          echo "Dependency installation failed after 3 attempts."
          exit 1

      - name: Lint
        run: yarn --cwd frontend lint

      - name: Test
        run: yarn --cwd frontend test

      - name: Test coverage
        run: yarn --cwd frontend test:coverage
